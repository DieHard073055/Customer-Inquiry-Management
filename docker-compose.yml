services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mse_app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/storage
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mse_network

  nginx:
    image: nginx:1.27-alpine
    container_name: mse_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - mse_network

  db:
    image: mysql:8.4
    container_name: mse_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mse_db
      MYSQL_USER: mse_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mse_db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mse_user", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mse_network

networks:
  mse_network:
    driver: bridge

volumes:
  mse_db_data:
